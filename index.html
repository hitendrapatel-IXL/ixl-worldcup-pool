<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>IXL Center · World Cup Pool</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: #F3F5F8; font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; color: #0E2A47; }
  #root { max-width: 980px; margin: 0 auto; padding: 20px 16px 40px; }
  button { font-family: inherit; cursor: pointer; }
  code { background: #EEF3F8; padding: 1px 5px; border-radius: 4px; font-size: 0.9em; }
  .ixp-btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; border: none; border-radius: 10px; font-weight: 600; transition: opacity .15s; }
  .ixp-btn:hover:not(:disabled) { opacity: .9; }
  .ixp-btn:disabled { opacity: .4; cursor: not-allowed; }
  .ixp-center { display: flex; align-items: center; justify-content: center; padding: 80px 0; color: #0E2A47; }
  .ixp-spin { animation: spin 1s linear infinite; } @keyframes spin { to { transform: rotate(360deg); } }
  .ixp-header { border-radius: 18px; overflow: hidden; margin-bottom: 18px; }
  .ixp-headrow { padding: 16px 18px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
  .ixp-brand { display: flex; align-items: center; gap: 12px; }
  .ixp-logo { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; }
  .ixp-title { color: white; font-weight: 700; font-size: 18px; line-height: 1.15; }
  .ixp-sub { font-size: 12px; color: #9DB4CE; }
  .ixp-tabs { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .ixp-navtab { display: inline-flex; align-items: center; gap: 6px; padding: 7px 12px; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; }
  .ixp-alliance { background: #ffffff; padding: 11px 18px; display: flex; align-items: center; gap: 18px; flex-wrap: wrap; }
  .ixp-alliance-label { display: flex; flex-direction: column; line-height: 1; }
  .ixp-alliance-label b { font-size: 13px; font-weight: 800; letter-spacing: .09em; color: #0E2A47; }
  .ixp-alliance-label span { font-size: 9px; font-weight: 700; letter-spacing: .16em; color: #A6B4C2; margin-top: 4px; }
  .ixp-alliance-logos { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
  .ixp-alliance-logos img { height: 36px; width: auto; display: block; }
  .ixp-alliance-sep { width: 1px; height: 30px; background: #E4E9EF; flex-shrink: 0; }
  @media (max-width: 720px) { .ixp-alliance-logos { gap: 14px; } .ixp-alliance-logos img { height: 28px; } .ixp-alliance-sep { height: 24px; } }
  .ixp-today-date { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 14px; }
  .ixp-daynav { width: 38px; height: 38px; border-radius: 10px; border: 1px solid #E4E9EF; background: white; display: flex; align-items: center; justify-content: center; color: #0E2A47; }
  .ixp-daynav:disabled { opacity: .35; }
  .ixp-celebrate { border-radius: 16px; padding: 16px; background: linear-gradient(135deg, #FFF7E8, #FDEFC7); border: 1px solid #F3D98C; margin-bottom: 16px; animation: pop .45s ease; }
  @keyframes pop { from { transform: scale(.97); opacity: .5; } to { transform: scale(1); opacity: 1; } }
  .ixp-celebrate .who { font-size: 20px; font-weight: 800; color: #0E2A47; }
  .ixp-gamecard { border: 1px solid #E4E9EF; border-radius: 16px; padding: 14px; background: white; margin-bottom: 12px; }
  .ixp-gameteams { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 16px; }
  .ixp-vs { color: #9AAABA; font-weight: 600; font-size: 13px; }
  .ixp-betbar { display: flex; height: 10px; border-radius: 6px; overflow: hidden; background: #EEF3F8; margin: 6px 0; }
  .ixp-names { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 2px; }
  .ixp-nchip { font-size: 11px; padding: 2px 7px; border-radius: 999px; background: #F1F5F9; color: #41566B; }
  .ixp-nchip.win { background: #EAF6F0; color: #0B6B4A; font-weight: 700; }
  .ixp-resultbadge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 9px; border-radius: 999px; font-size: 12px; font-weight: 700; }
  .ixp-wbtns { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
  .ixp-wbtn { flex: 1; min-width: 84px; padding: 9px; border-radius: 10px; border: 1px solid #E4E9EF; background: white; font-size: 13px; font-weight: 600; color: #0E2A47; }
  .ixp-wbtn, .ixp-tbtn, .ixp-teamrow, .ixp-btn, .ixp-daynav, .br-team.click { transition: transform .06s ease, filter .06s ease; }
  .ixp-wbtn:active, .ixp-tbtn:active, .ixp-teamrow:active, .ixp-btn:active, .ixp-daynav:active, .br-team.click:active { transform: scale(.96); filter: brightness(.93); }
  .br-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 10px; }
  .br-hint { font-size: 11px; color: #9AAABA; margin-bottom: 8px; }
  .br { position: relative; }
  .br-col-label { position: absolute; top: 2px; transform: translateX(-50%); font-size: 10px; font-weight: 700; letter-spacing: .05em; color: #9AAABA; }
  .br-cell { position: absolute; border: 1px solid #E4E9EF; border-radius: 10px; background: white; overflow: hidden; }
  .br-team { height: 26px; display: flex; align-items: center; gap: 5px; padding: 0 8px; font-size: 11.5px; font-weight: 600; color: #0E2A47; border-bottom: 1px solid #F0F3F6; }
  .br-name { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ixp-flag { border-radius: 2px; vertical-align: middle; flex-shrink: 0; box-shadow: 0 0 0 0.5px rgba(0,0,0,.08); }
  .ixp-hero { width: 100%; display: block; border-radius: 16px; margin-bottom: 16px; box-shadow: 0 8px 28px rgba(14,42,71,.18); }
  .ixp-kotime { font-size: 12px; font-weight: 700; color: #5B6B7C; }
  .br-team:last-child { border-bottom: none; }
  .br-team.win { background: #0E2A47; color: #fff; }
  .br-team.empty { color: #A9B6C2; font-weight: 500; }
  .br-team.click { cursor: pointer; }
  .br-team.click:hover { background: #EAF6F0; }
  .br-champ { position: absolute; transform: translateX(-50%); }
  .br-champbox { display: inline-flex; align-items: center; gap: 6px; background: #0E2A47; color: #fff; font-weight: 700; font-size: 13px; padding: 8px 14px; border-radius: 10px; white-space: nowrap; }
  .br-champbox.empty { background: #EEF3F8; color: #9AAABA; font-weight: 600; }
  .ixp-banner { margin-bottom: 14px; padding: 10px 16px; border-radius: 10px; font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 8px; }
  .ixp-ok { background: #E7F6EF; color: #0B6B4A; } .ixp-warn { background: #FDEFC7; color: #8A6410; }
  .ixp-err2 { background: #FFF1F1; color: #B4232A; }
  .ixp-foot { text-align: center; font-size: 12px; margin-top: 24px; color: #8AA0B8; }
  .ixp-link { background: none; border: none; color: #1A73C2; text-decoration: underline; font-size: 12px; padding: 0; }
  .ixp-card { border: 1px solid #E4E9EF; border-radius: 18px; padding: 18px; background: white; }
  .ixp-card-sm { border: 1px solid #E4E9EF; border-radius: 14px; padding: 12px; background: white; }
  .ixp-eyebrow { font-size: 11px; font-weight: 700; letter-spacing: .04em; margin-bottom: 4px; }
  .ixp-h2 { font-size: 20px; font-weight: 700; margin: 0 0 4px; }
  .ixp-muted { font-size: 14px; color: #5B6B7C; }
  .ixp-label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 4px; }
  .ixp-input { width: 100%; margin-bottom: 12px; padding: 10px 12px; border-radius: 10px; border: 1px solid #D7DEE6; outline: none; font-size: 14px; }
  .ixp-input:focus { border-color: #0F9D6E; }
  .ixp-err { font-size: 14px; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; color: #B4232A; }
  .ixp-grid5 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; }
  .ixp-col3 { grid-column: span 3; } .ixp-col2 { grid-column: span 2; }
  .ixp-grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  .ixp-stack > * + * { margin-top: 16px; } .ixp-stack-sm > * + * { margin-top: 10px; } .ixp-stack-xs > * + * { margin-top: 6px; }
  .ixp-rowbetween { display: flex; align-items: center; justify-content: space-between; }
  .ixp-howrow { display: flex; gap: 12px; }
  .ixp-num { width: 24px; height: 24px; flex-shrink: 0; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; background: #EEF3F8; color: #0E2A47; }
  .ixp-howfoot { margin-top: 12px; padding-top: 12px; border-top: 1px solid #EDF1F5; font-size: 12px; color: #6A7A8B; }
  .ixp-note { border-radius: 12px; padding: 14px; margin-bottom: 12px; } .ixp-note p { margin: 4px 0 0; font-size: 14px; }
  .ixp-note-ok { background: #EAF6F0; } .ixp-note-ok p { color: #3E5A4D; }
  .ixp-note-warn { background: #FFF7E8; } .ixp-note-warn p { color: #6B5523; }
  .ixp-noteh { display: flex; align-items: center; gap: 8px; font-weight: 600; }
  .ixp-back { display: inline-flex; align-items: center; gap: 4px; font-size: 14px; font-weight: 600; color: #0E2A47; background: none; border: none; margin-bottom: 12px; }
  .ixp-steps { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .ixp-step { padding: 7px 12px; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; }
  .ixp-statusbar { border-radius: 12px; padding: 12px 16px; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; position: sticky; top: 0; z-index: 5; }
  .ixp-groupgrid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .ixp-pill { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 999px; font-size: 12px; font-weight: 600; }
  .ixp-teamrow { width: 100%; display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; border-radius: 10px; font-size: 14px; font-weight: 500; border: 1px solid; }
  .ixp-tbtn { width: 100%; text-align: left; padding: 8px 12px; border-radius: 10px; font-size: 14px; font-weight: 500; border: 1px solid; }
  .ixp-roundhead { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .ixp-locked { border-radius: 10px; padding: 12px; font-size: 14px; display: flex; align-items: center; gap: 8px; background: #F5F7F9; color: #8093A4; }
  .ixp-matchgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .ixp-match { border: 1px solid #E4E9EF; border-radius: 12px; padding: 8px; background: white; }
  .ixp-matchlabel { font-size: 11px; font-weight: 700; margin-bottom: 4px; color: #9AAABA; }
  .ixp-champ { border-radius: 16px; padding: 20px; text-align: center; }
  .ixp-champname { color: white; font-size: 24px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .ixp-reviewrow { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #F0F3F6; font-size: 14px; }
  .ixp-champrow { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; margin-top: 6px; border-radius: 10px; background: #FFF7E8; }
  .ixp-ffrow { display: flex; align-items: center; gap: 8px; padding: 6px 0; font-size: 14px; font-weight: 500; }
  .ixp-empty { border: 1px solid #E4E9EF; border-radius: 18px; padding: 32px; text-align: center; font-size: 14px; color: #8093A4; background: white; }
  .ixp-table { border: 1px solid #E4E9EF; border-radius: 18px; overflow: hidden; background: white; }
  .ixp-trow { display: grid; grid-template-columns: 32px 1fr 44px 44px 44px 52px 64px; padding: 10px 16px; align-items: center; font-size: 14px; border-top: 1px solid #F0F3F6; }
  .ixp-thead { background: #F5F7F9; color: #6A7A8B; font-size: 12px; font-weight: 700; border-top: none; }
  .ixp-trow .cc { text-align: center; } .ixp-trow .c2r { text-align: right; }
  .ixp-chipwrap { display: flex; flex-wrap: wrap; gap: 6px; }
  .ixp-chip { padding: 6px 10px; border-radius: 10px; font-size: 12px; font-weight: 500; border: 1px solid; }
  @media (max-width: 720px) {
    .ixp-grid5, .ixp-grid2, .ixp-groupgrid, .ixp-matchgrid { grid-template-columns: 1fr; }
    .ixp-col3, .ixp-col2 { grid-column: span 1; }
    .ixp-groupgrid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
